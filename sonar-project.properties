# SonarCloud 設定
# 各 toolset の register() 関数シグネチャが共通インターフェースとして
# 意図的に同一であるため、重複検出から除外
sonar.cpd.exclusions=src/bitbucket_mcp/toolsets/**/*.py

# AuthProvider Protocol の async aclose を実装するため、await を使わない async メソッドとして意図的
# python:S7503 = Use asynchronous features in this function or remove the `async` keyword.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e1.resourceKey=src/bitbucket_mcp/auth.py
